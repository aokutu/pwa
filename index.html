<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="test.png" type="image/png">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h1>My PWA App (IndexedDB)</h1>
    <div id="content">Loading...</div>
    
    <form id="myform" style="margin-top: 20px;">

        <button onclick="shareContent()">Share</button>

<script>
function shareContent() {
  if (navigator.share) {
    navigator.share({
      title: 'My App',
      text: 'Check this out!',
      url: window.location.href
    });
  } else {
    alert("Sharing not supported.");
  }
}
</script>

         <input type="text" name="name" placeholder="Your name" required style="padding: 10px; width: 200px;"><br><br>
        <input type="email" name="email" placeholder="Your email" required style="padding: 10px; width: 200px; margin-left: 10px;"><br><br>
        <textarea name="message" placeholder="Message" style="padding: 10px; width: 200px; height: 80px; margin-left: 10px;"></textarea><br><br>
       <button type="button" onclick="shareContent()">Share</button>
    </form>
    <div id="status" style="margin-top: 10px; font-weight: bold;"></div>
    <div id="pending" style="margin-top: 10px; color: orange;"></div>
    
    <script src="app.js"></script>
    <script>
    $(document).ready(function() {
        $('#content').html('PWA Ready! 🚀 <strong>IndexedDB Storage</strong>');
        
        // Form submission (Service Worker handles it!)
        $('#myform').on('submit', function(e) {
            e.preventDefault();
            $('#status').html('⏳ Submitting...');
            
            $.post('/submit.php', $(this).serialize())
                .done(data => {
                    $('#status').html('✅ ' + data.message);
                    $('#myform')[0].reset();
                    checkPendingForms();
                })
                .fail((xhr) => {
                    // Service Worker already handled offline case
                    $('#status').html('💾 ' + xhr.responseJSON?.message || 'Saved offline!');
                    checkPendingForms();
                });
        });
        
        // Check pending forms
        function checkPendingForms() {
            getPendingCount().then(count => {
                $('#pending').html(`📦 Pending forms: <strong>${count}</strong>`);
            });
        }
        checkPendingForms(); // Initial check
    });
    
    // IndexedDB Helpers
    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('PWAForms', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
        });
    }
    
    async function getPendingCount() {
        const db = await openDB();
        const tx = db.transaction('forms', 'readonly');
        const store = tx.objectStore('forms');
        const count = await store.count();
        return count;
    }
    
    // Auto-sync when online
    window.addEventListener('online', async () => {
        const db = await openDB();
        const tx = db.transaction('forms', 'readonly');
        const store = tx.objectStore('forms');
        const forms = await store.getAll();
        
        for (const form of forms) {
            const response = await fetch('/submit.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(form)
            });
            
            if (response.ok) {
                const txDelete = db.transaction('forms', 'readwrite');
                const storeDelete = txDelete.objectStore('forms');
                storeDelete.delete(form.id);
            }
        }
        location.reload(); // Refresh to update count
    });
    </script>
</body>
</html>
